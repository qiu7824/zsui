name: star progress

on:
  watch:
    types: [started]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-progress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    if: github.repository == 'qiu7824/zsui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Render current milestone
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-star-progress.ps1

      - name: Commit changed progress
        shell: bash
        run: |
          if git diff --quiet -- docs/images/star-progress.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/images/star-progress.svg
          git commit -m "docs: update star progress [skip ci]"
          git push
