name: star history

on:
  watch:
    types: [started]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-history-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    if: github.repository == 'qiu7824/zsui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Render star history
        shell: pwsh
        env:
          # The built-in token cannot read the repository's stargazer timeline.
          # STAR_HISTORY_TOKEN is a repository secret with read access to this repository.
          GITHUB_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN }}
        run: ./scripts/update-star-history.ps1

      - name: Commit changed chart
        shell: bash
        run: |
          if git diff --quiet -- docs/images/star-history.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/images/star-history.svg
          git commit -m "docs: update star history [skip ci]"
          git push
