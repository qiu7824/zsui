name: Native UI Proof

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "examples/**"
      - "tests/native-baselines/**"
      - "tools/native-proof/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/native-proof.yml"
  pull_request:
    paths:
      - "src/**"
      - "examples/**"
      - "tests/native-baselines/**"
      - "tools/native-proof/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/native-proof.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-appkit-proof:
    name: AppKit Runtime Proof
    runs-on: macos-15
    timeout-minutes: 30
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      TZ: UTC
      ZSUI_NATIVE_PROOF_OS_FAMILY: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Assert runner identity
        shell: bash
        run: |
          test "$(sw_vers -productVersion | cut -d. -f1)" = "15"
          test "$(uname -m)" = "arm64"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build AppKit proof applications
        run: |
          cargo build \
            --release \
            --locked \
            --example component_gallery \
            --no-default-features \
            --features component-gallery-demo
          cargo build \
            --release \
            --locked \
            --example zsui_notepad \
            --no-default-features \
            --features notepad-demo

      - name: Run real AppKit proof scenes
        run: |
          mkdir -p target/native-proof/macos-15-arm64
          for page in inputs collections navigation feedback catalog; do
            ./target/release/examples/component_gallery \
              --native-proof \
              --page "$page" \
              --theme light \
              --width 1024 \
              --height 640 \
              --output target/native-proof/macos-15-arm64
          done
          ./target/release/examples/component_gallery \
            --native-proof \
            --page inputs \
            --theme dark \
            --width 1024 \
            --height 640 \
            --output target/native-proof/macos-15-arm64
          ./target/release/examples/zsui_notepad \
            --native-proof \
            --width 960 \
            --height 640 \
            --output target/native-proof/macos-15-arm64

      - name: Validate AppKit artifacts
        shell: python
        run: |
          import json
          from pathlib import Path

          root = Path("target/native-proof/macos-15-arm64")
          stems = (
              "gallery-inputs-light",
              "gallery-inputs-dark",
              "gallery-collections-light",
              "gallery-navigation-light",
              "gallery-feedback-light",
              "gallery-catalog-light",
              "notepad-interaction",
          )
          for stem in stems:
              png = root / f"{stem}.png"
              report = root / f"{stem}.json"
              if png.read_bytes()[:8] != b"\x89PNG\r\n\x1a\n":
                  raise SystemExit(f"{png} is not a PNG")
              proof = json.loads(report.read_text(encoding="utf-8"))
              runtime = proof["runtime"]
              capture = runtime.get("native_view_capture") or {}
              assert proof["schema"] == "zsui.native-proof/v1"
              assert proof["schema_version"] == 1
              assert proof["platform"] == "macos"
              assert proof["backend"] == "appkit"
              assert proof["capture_backend"] == "appkit_nsview_bitmap_cache"
              assert proof["os_family"] == "macos-15"
              assert proof["architecture"] == "arm64"
              assert proof["errors"] == []
              assert proof["unhandled_commands"] == []
              assert isinstance(proof["messages"], list)
              typography = proof["typography"]
              assert typography["platform"] == "Macos"
              assert typography["source"] == "appkit_preferred_body_system_font"
              assert typography["ui_font_family"]
              assert typography["configured_ui_font"]
              assert typography["body_metrics"]["size"] > 0
              assert typography["body_metrics"]["ascent"] > 0
              assert typography == capture["typography"]
              memory = proof["process_memory"]
              assert memory["source"] == "macos_mach_task_basic_info"
              assert memory["sample_point"] == "proof_document_serialization"
              assert memory["resident_bytes"] > 0
              assert memory["peak_resident_bytes"] >= memory["resident_bytes"]
              assert runtime["created_window_count"] == 1
              assert runtime["screenshot_captured"] is True
              assert not runtime["screenshot_error"]
              assert capture["backend"] == "appkit_nsview_bitmap_cache"
              assert capture["pixel_width"] > 0
              assert capture["pixel_height"] > 0
              assert capture["scale_factor"] > 0.0
              assert 0.75 <= capture["typography_scale"] <= 3.0
              expected = (
                  {"width": 1024, "height": 640}
                  if stem.startswith("gallery-")
                  else {"width": 960, "height": 640}
              )
              assert proof["window"]["width"] == expected["width"]
              assert proof["window"]["height"] == expected["height"]
              assert proof["window"]["logical_width"] == expected["width"]
              assert proof["window"]["logical_height"] == expected["height"]
              assert proof["window"]["pixel_width"] == capture["pixel_width"]
              assert proof["window"]["pixel_height"] == capture["pixel_height"]
              assert proof["scale_factor"] == capture["scale_factor"]
              assert proof["typography_scale"] == capture["typography_scale"]
              assert capture["logical_width"] == expected["width"]
              assert capture["logical_height"] == expected["height"]
              assert abs(
                  capture["pixel_width"]
                  - capture["logical_width"] * capture["scale_factor"]
              ) <= 1.0

      - name: Upload AppKit proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zsui-appkit-native-proof
          path: target/native-proof/macos-15-arm64
          if-no-files-found: error
          retention-days: 30

  linux-direct-proof:
    name: Lightweight Linux Runtime Proof
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      TZ: UTC
      WINIT_UNIX_BACKEND: x11
      ZSUI_LINUX_UI_FONT: Ubuntu Sans 11
      ZSUI_NATIVE_PROOF_OS_FAMILY: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux proof runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libcairo2-dev \
            libdbus-1-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libx11-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            adwaita-icon-theme \
            librsvg2-common \
            xvfb \
            xauth \
            dbus-x11 \
            fonts-ubuntu \
            fonts-noto-cjk \
            fonts-noto-color-emoji
          fc-cache --force
          fc-match 'Ubuntu Sans:style=Regular'
          fc-match 'sans-serif:lang=zh-cn'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build lightweight Linux proof applications
        run: |
          cargo build \
            --release \
            --locked \
            --example component_gallery \
            --no-default-features \
            --features component-gallery-demo
          cargo build \
            --release \
            --locked \
            --example zsui_notepad \
            --no-default-features \
            --features notepad-demo

      - name: Run real Linux proof scenes
        id: linux-scenes
        run: |
          set -o pipefail
          mkdir -p target/native-proof/ubuntu-24.04-x86_64
          for page in inputs collections navigation feedback catalog; do
            dbus-run-session -- xvfb-run -a \
              ./target/release/examples/component_gallery \
                --native-proof \
                --page "$page" \
                --theme light \
                --width 1180 \
                --height 780 \
                --output target/native-proof/ubuntu-24.04-x86_64 \
              2>&1 | tee "target/native-proof/ubuntu-24.04-x86_64/gallery-$page-light.log"
          done
          dbus-run-session -- xvfb-run -a \
            ./target/release/examples/component_gallery \
              --native-proof \
              --page inputs \
              --theme dark \
              --width 1180 \
              --height 780 \
              --output target/native-proof/ubuntu-24.04-x86_64 \
            2>&1 | tee target/native-proof/ubuntu-24.04-x86_64/gallery-inputs-dark.log
          dbus-run-session -- xvfb-run -a \
            ./target/release/examples/zsui_notepad \
              --native-proof \
              --width 960 \
              --height 640 \
              --output target/native-proof/ubuntu-24.04-x86_64 \
            2>&1 | tee target/native-proof/ubuntu-24.04-x86_64/notepad.log

      - name: Summarize Linux proof failure
        if: failure() && steps.linux-scenes.outcome == 'failure'
        run: |
          root=target/native-proof/ubuntu-24.04-x86_64
          summary="$(grep -Eai 'error|failed|panic|capture|display|xvfb|gtk' "$root"/*.log | tail -30 | tr '\n' ' ' || true)"
          if test -z "$summary"; then
            summary="$(tail -30 "$root"/*.log | tr '\n' ' ' || true)"
          fi
          echo "::error title=Linux proof scene failure::$summary"

      - name: Validate Linux artifacts
        shell: python
        run: |
          import json
          from pathlib import Path

          root = Path("target/native-proof/ubuntu-24.04-x86_64")
          stems = (
              "gallery-inputs-light",
              "gallery-inputs-dark",
              "gallery-collections-light",
              "gallery-navigation-light",
              "gallery-feedback-light",
              "gallery-catalog-light",
              "notepad-interaction",
          )
          for stem in stems:
              png = root / f"{stem}.png"
              report = root / f"{stem}.json"
              if png.read_bytes()[:8] != b"\x89PNG\r\n\x1a\n":
                  raise SystemExit(f"{png} is not a PNG")
              proof = json.loads(report.read_text(encoding="utf-8"))
              runtime = proof["runtime"]
              capture = runtime.get("native_view_capture") or {}
              assert proof["schema"] == "zsui.native-proof/v1"
              assert proof["schema_version"] == 1
              assert proof["platform"] == "linux"
              assert proof["backend"] == "linux-direct"
              assert proof["capture_backend"] == "winit_softbuffer_pango_cairo"
              assert proof["display_server"] == "x11"
              assert proof["os_family"] == "ubuntu-24.04"
              assert proof["architecture"] == "x86_64"
              assert proof["errors"] == []
              assert proof["unhandled_commands"] == []
              assert isinstance(proof["messages"], list)
              typography = proof["typography"]
              assert typography["platform"] == "Gtk"
              assert typography["source"] == "fontconfig_pango_context"
              assert typography["ui_font_family"] == "Ubuntu Sans"
              assert typography["configured_ui_font"] == "Ubuntu Sans 11"
              assert typography["body_metrics"]["size"] > 0
              assert typography["body_metrics"]["ascent"] > 0
              assert typography == capture["typography"]
              memory = proof["process_memory"]
              assert memory["source"] == "linux_procfs_status_smaps_rollup"
              assert memory["sample_point"] == "native_window_before_teardown"
              assert memory["resident_bytes"] > 0
              assert memory["peak_resident_bytes"] >= memory["resident_bytes"]
              assert runtime["created_window_count"] == 1
              assert runtime["screenshot_captured"] is True
              assert not runtime["screenshot_error"]
              assert capture["backend"] == "winit_softbuffer_pango_cairo"
              assert capture["display_server"] == "x11"
              assert capture["pixel_width"] > 0
              assert capture["pixel_height"] > 0
              assert capture["scale_factor"] > 0.0
              assert 0.75 <= capture["typography_scale"] <= 3.0
              expected = (
                  {"width": 1180, "height": 780}
                  if stem.startswith("gallery-")
                  else {"width": 960, "height": 640}
              )
              assert proof["window"]["width"] == expected["width"]
              assert proof["window"]["height"] == expected["height"]
              assert proof["window"]["logical_width"] == expected["width"]
              assert proof["window"]["logical_height"] == expected["height"]
              assert proof["window"]["pixel_width"] == capture["pixel_width"]
              assert proof["window"]["pixel_height"] == capture["pixel_height"]
              assert proof["scale_factor"] == capture["scale_factor"]
              assert proof["typography_scale"] == capture["typography_scale"]
              assert capture["logical_width"] == expected["width"]
              assert capture["logical_height"] == expected["height"]
              assert abs(
                  capture["pixel_width"]
                  - capture["logical_width"] * capture["scale_factor"]
              ) <= 1.0

      - name: Upload Linux proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zsui-linux-direct-native-proof
          path: target/native-proof/ubuntu-24.04-x86_64
          if-no-files-found: error
          retention-days: 30

  linux-wayland-atspi-proof:
    name: Wayland Runtime, AT-SPI and Menu Proof
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      TZ: UTC
      WINIT_UNIX_BACKEND: wayland
      ZSUI_LINUX_UI_FONT: Ubuntu Sans 11
      ZSUI_NATIVE_PROOF_OS_FAMILY: ubuntu-24.04
      ZSUI_NATIVE_PROOF_DURATION_MS: 12000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Wayland and AT-SPI proof runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            at-spi2-core \
            dbus-x11 \
            libcairo2-dev \
            libdbus-1-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libwayland-dev \
            libxkbcommon-dev \
            adwaita-icon-theme \
            librsvg2-common \
            fonts-ubuntu \
            fonts-noto-cjk \
            fonts-noto-color-emoji \
            python3-pyatspi \
            weston
          fc-cache --force

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Wayland proof applications with accessibility
        run: |
          cargo build \
            --release \
            --locked \
            --example component_gallery \
            --no-default-features \
            --features component-gallery-demo,accessibility
          cargo build \
            --release \
            --locked \
            --example zsui_notepad \
            --no-default-features \
            --features notepad-demo,accessibility

      - name: Run real Wayland, AT-SPI and menu scenes
        id: wayland-scenes
        run: |
          set -o pipefail
          root=target/native-proof/ubuntu-24.04-wayland-x86_64
          mkdir -p "$root"
          dbus-run-session -- bash -euxo pipefail <<'PROOF'
          root=target/native-proof/ubuntu-24.04-wayland-x86_64
          export XDG_RUNTIME_DIR="$RUNNER_TEMP/zsui-wayland-runtime"
          export WAYLAND_DISPLAY=wayland-zsui
          export WINIT_UNIX_BACKEND=wayland
          export NO_AT_BRIDGE=0
          export GTK_A11Y=always
          unset DISPLAY
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          weston_help="$(weston --help 2>&1 || true)"
          weston_args=(
            "--socket=$WAYLAND_DISPLAY"
            "--idle-time=0"
            "--width=1280"
            "--height=800"
            "--log=$PWD/$root/weston.log"
          )
          if grep -q -- '--renderer' <<<"$weston_help"; then
            weston_args+=("--renderer=pixman")
          else
            weston_args+=("--use-pixman")
          fi
          if grep -q -- '-B,' <<<"$weston_help" || grep -q -- '-B ' <<<"$weston_help"; then
            weston_args+=("-B" "headless")
          else
            weston_args+=("--backend=headless-backend.so")
          fi
          weston "${weston_args[@]}" &
          weston_pid=$!
          trap 'kill "$weston_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 100); do
            test -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" && break
            kill -0 "$weston_pid"
            sleep 0.1
          done
          test -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY"

          ./target/release/examples/component_gallery \
            --native-proof \
            --page inputs \
            --theme light \
            --width 1180 \
            --height 780 \
            --output "$root" \
            >"$root/gallery-inputs-light.log" 2>&1 &
          gallery_pid=$!

          # AccessKit intentionally activates its Unix adapter only after the
          # org.a11y.Status IsEnabled property changes. A headless Weston
          # session has no desktop settings daemon to perform that transition,
          # so drive the real AT-SPI status service after the app is listening.
          for attempt in $(seq 1 50); do
            if gdbus introspect \
              --session \
              --dest org.a11y.Bus \
              --object-path /org/a11y/bus \
              >"$root/atspi-status.log" 2>&1; then
              break
            fi
            sleep 0.1
          done
          sleep 0.5
          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Set \
            org.a11y.Status IsEnabled '<false>' \
            >>"$root/atspi-status.log"
          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Set \
            org.a11y.Status IsEnabled '<true>' \
            >>"$root/atspi-status.log"
          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Get \
            org.a11y.Status IsEnabled \
            >>"$root/atspi-status.log"

          /usr/bin/python3 - <<'PY'
          import json
          import time
          from pathlib import Path
          import pyatspi

          deadline = time.monotonic() + 10.0
          application = None
          snapshot = []

          def children(node):
              for index in range(node.childCount):
                  try:
                      yield node.getChildAtIndex(index)
                  except Exception:
                      pass

          def walk(root, limit=1500):
              queue = [root]
              seen = 0
              while queue and seen < limit:
                  node = queue.pop(0)
                  seen += 1
                  yield node
                  queue.extend(children(node))

          while time.monotonic() < deadline and application is None:
              desktop = pyatspi.Registry.getDesktop(0)
              for candidate in children(desktop):
                  try:
                      nodes = list(walk(candidate))
                      names = [node.name or "" for node in nodes]
                  except Exception:
                      continue
                  if any("Component Gallery" in name for name in names):
                      application = candidate
                      break
              if application is None:
                  time.sleep(0.1)

          if application is None:
              raise SystemExit("AT-SPI did not expose the ZSUI Component Gallery")

          action_invoked = False
          for node in walk(application):
              try:
                  role = node.getRoleName()
                  name = node.name or ""
              except Exception:
                  continue
              snapshot.append({"name": name, "role": role})
              if not action_invoked and role in {"push button", "button"}:
                  try:
                      actions = node.queryAction()
                      for index in range(actions.nActions):
                          if actions.getName(index) in {"click", "press", "activate"}:
                              action_invoked = bool(actions.doAction(index))
                              break
                  except Exception:
                      pass

          roles = {item["role"] for item in snapshot}
          if len(snapshot) < 5:
              raise SystemExit(f"AT-SPI tree is too small: {len(snapshot)} nodes")
          if not ({"push button", "button"} & roles):
              raise SystemExit(f"AT-SPI tree has no button role: {sorted(roles)}")
          if not action_invoked:
              raise SystemExit("AT-SPI did not invoke an exposed button action")

          Path(
              "target/native-proof/ubuntu-24.04-wayland-x86_64/atspi-proof.json"
          ).write_text(
              json.dumps(
                  {
                      "backend": "accesskit_atspi",
                      "application": application.name,
                      "node_count": len(snapshot),
                      "roles": sorted(roles),
                      "action_invoked": action_invoked,
                      "nodes": snapshot,
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )
          PY
          wait "$gallery_pid"

          ZSUI_NATIVE_PROOF_DURATION_MS=2500 \
          ZSUI_NATIVE_PROOF_OPEN_MENU=1 \
            ./target/release/examples/zsui_notepad \
              --native-proof \
              --menu-proof \
              --width 960 \
              --height 640 \
              --output "$root" \
              >"$root/notepad.log" 2>&1
          PROOF

      - name: Summarize Wayland proof failure
        if: failure() && steps.wayland-scenes.outcome == 'failure'
        run: |
          root=target/native-proof/ubuntu-24.04-wayland-x86_64
          tail -80 "$root"/*.log 2>/dev/null || true
          echo "::error title=Wayland proof scene failure::See the uploaded Weston and application logs"

      - name: Validate Wayland, AT-SPI and menu artifacts
        shell: python
        run: |
          import json
          from pathlib import Path

          root = Path("target/native-proof/ubuntu-24.04-wayland-x86_64")
          gallery = json.loads((root / "gallery-inputs-light.json").read_text("utf-8"))
          notepad = json.loads((root / "notepad-interaction.json").read_text("utf-8"))
          atspi = json.loads((root / "atspi-proof.json").read_text("utf-8"))

          for proof in (gallery, notepad):
              capture = proof["runtime"]["native_view_capture"]
              assert proof["schema"] == "zsui.native-proof/v1"
              assert proof["platform"] == "linux"
              assert proof["backend"] == "linux-direct"
              assert proof["display_server"] == "wayland"
              assert capture["display_server"] == "wayland"
              assert proof["errors"] == []
              assert proof["unhandled_commands"] == []
              assert proof["runtime"]["native_accessibility_backend"] == "accesskit_atspi"
              assert proof["runtime"]["native_accessibility_node_count"] >= 5

          assert gallery["runtime"]["native_accessibility_action_count"] >= 1
          assert atspi["backend"] == "accesskit_atspi"
          assert atspi["node_count"] >= 5
          assert atspi["action_invoked"] is True

          runtime = notepad["runtime"]
          assert runtime["window_menu_surface_created"] is True
          assert runtime["window_menu_surface_height"] == 36
          assert runtime["window_menu_surface_open_at_capture"] is True
          assert runtime["window_menu_command_routed"] is True
          assert (
              root / "gallery-inputs-light.png"
          ).read_bytes()[:8] == b"\x89PNG\r\n\x1a\n"
          assert (
              root / "notepad-interaction.png"
          ).read_bytes()[:8] == b"\x89PNG\r\n\x1a\n"

      - name: Upload Wayland, AT-SPI and menu proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zsui-wayland-atspi-menu-proof
          path: target/native-proof/ubuntu-24.04-wayland-x86_64
          if-no-files-found: error
          retention-days: 30
