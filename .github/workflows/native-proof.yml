name: Native UI Proof

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "examples/**"
      - "tests/native-baselines/**"
      - "tools/native-proof/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/native-proof.yml"
  pull_request:
    paths:
      - "src/**"
      - "examples/**"
      - "tests/native-baselines/**"
      - "tools/native-proof/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/native-proof.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-appkit-proof:
    name: AppKit Runtime Proof
    runs-on: macos-15
    timeout-minutes: 30
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      TZ: UTC
      ZSUI_NATIVE_PROOF_OS_FAMILY: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Assert runner identity
        shell: bash
        run: |
          test "$(sw_vers -productVersion | cut -d. -f1)" = "15"
          test "$(uname -m)" = "arm64"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build AppKit proof applications
        run: |
          cargo build \
            --release \
            --locked \
            --example component_gallery \
            --no-default-features \
            --features component-gallery-demo,accessibility
          cargo build \
            --release \
            --locked \
            --example zsui_notepad \
            --no-default-features \
            --features notepad-demo,accessibility
          cargo build \
            --release \
            --locked \
            --example native_smoke_run \
            --no-default-features \
            --features macos-appkit,native-smoke,button,label

      - name: Run real AppKit proof scenes
        run: |
          mkdir -p target/native-proof/macos-15-arm64
          for page in inputs collections navigation feedback catalog; do
            ./target/release/examples/component_gallery \
              --native-proof \
              --page "$page" \
              --theme light \
              --width 1024 \
              --height 640 \
              --output target/native-proof/macos-15-arm64
          done
          ./target/release/examples/component_gallery \
            --native-proof \
            --page inputs \
            --theme dark \
            --width 1024 \
            --height 640 \
            --output target/native-proof/macos-15-arm64
          ./target/release/examples/zsui_notepad \
            --native-proof \
            --width 960 \
            --height 640 \
            --output target/native-proof/macos-15-arm64
          mkdir -p target/native-proof/macos-status-item
          ./target/release/examples/native_smoke_run \
            current \
            target/native-proof/macos-status-item \
            --status-item \
            --view \
            > target/native-proof/macos-status-item/status-item-run.json

      - name: Validate AppKit artifacts
        shell: python
        run: |
          import json
          from pathlib import Path

          root = Path("target/native-proof/macos-15-arm64")
          stems = (
              "gallery-inputs-light",
              "gallery-inputs-dark",
              "gallery-collections-light",
              "gallery-navigation-light",
              "gallery-feedback-light",
              "gallery-catalog-light",
              "notepad-interaction",
          )
          for stem in stems:
              png = root / f"{stem}.png"
              report = root / f"{stem}.json"
              if png.read_bytes()[:8] != b"\x89PNG\r\n\x1a\n":
                  raise SystemExit(f"{png} is not a PNG")
              proof = json.loads(report.read_text(encoding="utf-8"))
              runtime = proof["runtime"]
              capture = runtime.get("native_view_capture") or {}
              assert proof["schema"] == "zsui.native-proof/v1"
              assert proof["schema_version"] == 1
              assert proof["platform"] == "macos"
              assert proof["backend"] == "appkit"
              assert proof["capture_backend"] == "appkit_nsview_bitmap_cache"
              assert proof["os_family"] == "macos-15"
              assert proof["architecture"] == "arm64"
              assert proof["errors"] == []
              assert proof["unhandled_commands"] == []
              assert isinstance(proof["messages"], list)
              typography = proof["typography"]
              assert typography["platform"] == "Macos"
              assert typography["source"] == "appkit_preferred_body_system_font"
              assert typography["ui_font_family"]
              assert typography["configured_ui_font"]
              assert typography["body_metrics"]["size"] > 0
              assert typography["body_metrics"]["ascent"] > 0
              assert typography == capture["typography"]
              memory = proof["process_memory"]
              assert memory["source"] == "macos_mach_task_basic_info"
              assert memory["sample_point"] == "proof_document_serialization"
              assert memory["resident_bytes"] > 0
              assert memory["peak_resident_bytes"] >= memory["resident_bytes"]
              assert runtime["created_window_count"] == 1
              assert runtime["screenshot_captured"] is True
              assert not runtime["screenshot_error"]
              assert capture["backend"] == "appkit_nsview_bitmap_cache"
              assert capture["pixel_width"] > 0
              assert capture["pixel_height"] > 0
              assert capture["scale_factor"] > 0.0
              assert 0.75 <= capture["typography_scale"] <= 3.0
              expected = (
                  {"width": 1024, "height": 640}
                  if stem.startswith("gallery-")
                  else {"width": 960, "height": 640}
              )
              assert proof["window"]["width"] == expected["width"]
              assert proof["window"]["height"] == expected["height"]
              assert proof["window"]["logical_width"] == expected["width"]
              assert proof["window"]["logical_height"] == expected["height"]
              assert proof["window"]["pixel_width"] == capture["pixel_width"]
              assert proof["window"]["pixel_height"] == capture["pixel_height"]
              assert proof["scale_factor"] == capture["scale_factor"]
              assert proof["typography_scale"] == capture["typography_scale"]
              assert capture["logical_width"] == expected["width"]
              assert capture["logical_height"] == expected["height"]
              assert abs(
                  capture["pixel_width"]
                  - capture["logical_width"] * capture["scale_factor"]
              ) <= 1.0
              if stem == "gallery-feedback-light":
                  assert proof["messages"] == ["MenuFlyoutCommand", "MenuFlyoutOpenChanged", "OpenMenuFlyout"]
                  assert runtime["native_view_message_count"] >= 3
                  assert runtime["native_view_event_count"] >= 2
                  assert runtime["native_view_menu_flyout_invoke_count"] == 1
                  assert runtime["native_view_menu_flyout_open_change_count"] == 1
                  assert runtime["native_view_menu_flyout_submenu_change_count"] == 4
                  assert runtime["native_view_key_down_count"] == 9
                  assert runtime["native_view_keyboard_activation_count"] == 1

                  assert runtime["native_view_focused_widget"] == 408
                  assert runtime["native_view_unhandled_click_count"] == 0
                  assert runtime["native_accessibility_backend"] == "appkit_nsaccessibility"
                  assert runtime["native_accessibility_node_count"] >= 8
                  assert any(
                      event.startswith("appkit_accessibility_tree:nodes=8/8,checked=1/1,expanded=2/2,")
                      for event in runtime["events"]
                  )
                  roles = {widget["role"] for widget in proof["widgets"]}
                  assert {"menu_flyout", "menu_flyout_scrim", "menu_flyout_item"} <= roles
              if stem == "gallery-catalog-light":
                  assert runtime["native_view_pointer_down_count"] == 2
                  assert runtime["native_view_pointer_move_count"] == 1
                  assert runtime["native_view_pointer_up_count"] == 2
                  assert runtime["native_view_canvas_pointer_event_count"] == 5
                  assert runtime["native_view_canvas_pointer_drag_count"] == 1
                  assert runtime["native_view_unhandled_click_count"] == 0

          status = json.loads(
              Path("target/native-proof/macos-status-item/status-item-run.json")
              .read_text(encoding="utf-8")
          )["run"]
          assert status["status_item_requested"] is True
          assert status["status_item_required"] is True
          assert status["status_item_created"] is True
          assert status["status_item_error"] is None
          assert status["status_menu_native_command_count"] == 2
          assert status["status_menu_command_routed"] is True
          assert status["status_menu_popup_created"] is True
          assert status["status_menu_popup_destroyed"] is True

      - name: Upload AppKit proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zsui-appkit-native-proof
          path: |
            target/native-proof/macos-15-arm64
            target/native-proof/macos-status-item
          if-no-files-found: error
          retention-days: 30

  linux-direct-proof:
    name: Lightweight Linux Runtime Proof
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      TZ: UTC
      WINIT_UNIX_BACKEND: x11
      ZSUI_LINUX_UI_FONT: Ubuntu Sans 11
      ZSUI_NATIVE_PROOF_OS_FAMILY: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux proof runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libcairo2-dev \
            libdbus-1-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libx11-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            adwaita-icon-theme \
            librsvg2-common \
            xvfb \
            xauth \
            dbus-x11 \
            fonts-ubuntu \
            fonts-noto-cjk \
            fonts-noto-color-emoji
          fc-cache --force
          fc-match 'Ubuntu Sans:style=Regular'
          fc-match 'sans-serif:lang=zh-cn'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build lightweight Linux proof applications
        run: |
          cargo build \
            --release \
            --locked \
            --example component_gallery \
            --no-default-features \
            --features component-gallery-demo
          cargo build \
            --release \
            --locked \
            --example zsui_notepad \
            --no-default-features \
            --features notepad-demo
          cargo build \
            --release \
            --locked \
            --example zsui_notepad_lite \
            --no-default-features \
            --features notepad-demo-lite

      - name: Verify lite renderer linkage
        run: |
          if ldd target/release/examples/zsui_notepad_lite | grep -Eiq 'cairo|pango'; then
            ldd target/release/examples/zsui_notepad_lite
            echo "linux-direct-lite unexpectedly links Cairo/Pango" >&2
            exit 1
          fi

      - name: Run real Linux proof scenes
        id: linux-scenes
        run: |
          set -o pipefail
          mkdir -p \
            target/native-proof/ubuntu-24.04-x86_64 \
            target/native-proof/ubuntu-24.04-x86_64-lite
          for page in inputs collections navigation feedback catalog; do
            dbus-run-session -- xvfb-run -a \
              ./target/release/examples/component_gallery \
                --native-proof \
                --page "$page" \
                --theme light \
                --width 1180 \
                --height 780 \
                --output target/native-proof/ubuntu-24.04-x86_64 \
              2>&1 | tee "target/native-proof/ubuntu-24.04-x86_64/gallery-$page-light.log"
          done
          dbus-run-session -- xvfb-run -a \
            ./target/release/examples/component_gallery \
              --native-proof \
              --page inputs \
              --theme dark \
              --width 1180 \
              --height 780 \
              --output target/native-proof/ubuntu-24.04-x86_64 \
            2>&1 | tee target/native-proof/ubuntu-24.04-x86_64/gallery-inputs-dark.log
          dbus-run-session -- xvfb-run -a \
            ./target/release/examples/zsui_notepad \
              --native-proof \
              --width 960 \
              --height 640 \
              --output target/native-proof/ubuntu-24.04-x86_64 \
            2>&1 | tee target/native-proof/ubuntu-24.04-x86_64/notepad.log
          dbus-run-session -- xvfb-run -a \
            ./target/release/examples/zsui_notepad_lite \
              --native-proof \
              --width 960 \
              --height 640 \
              --output target/native-proof/ubuntu-24.04-x86_64-lite \
            2>&1 | tee target/native-proof/ubuntu-24.04-x86_64-lite/notepad.log

      - name: Summarize Linux proof failure
        if: failure() && steps.linux-scenes.outcome == 'failure'
        run: |
          root=target/native-proof/ubuntu-24.04-x86_64
          summary="$(grep -Eai 'error|failed|panic|capture|display|xvfb|gtk' "$root"/*.log | tail -30 | tr '\n' ' ' || true)"
          if test -z "$summary"; then
            summary="$(tail -30 "$root"/*.log | tr '\n' ' ' || true)"
          fi
          echo "::error title=Linux proof scene failure::$summary"

      - name: Validate Linux artifacts
        shell: python
        run: |
          import json
          from pathlib import Path

          root = Path("target/native-proof/ubuntu-24.04-x86_64")
          stems = (
              "gallery-inputs-light",
              "gallery-inputs-dark",
              "gallery-collections-light",
              "gallery-navigation-light",
              "gallery-feedback-light",
              "gallery-catalog-light",
              "notepad-interaction",
          )
          for stem in stems:
              png = root / f"{stem}.png"
              report = root / f"{stem}.json"
              if png.read_bytes()[:8] != b"\x89PNG\r\n\x1a\n":
                  raise SystemExit(f"{png} is not a PNG")
              proof = json.loads(report.read_text(encoding="utf-8"))
              runtime = proof["runtime"]
              capture = runtime.get("native_view_capture") or {}
              assert proof["schema"] == "zsui.native-proof/v1"
              assert proof["schema_version"] == 1
              assert proof["platform"] == "linux"
              assert proof["backend"] == "linux-direct"
              assert proof["capture_backend"] == "winit_softbuffer_pango_cairo"
              assert proof["display_server"] == "x11"
              assert proof["os_family"] == "ubuntu-24.04"
              assert proof["architecture"] == "x86_64"
              assert proof["errors"] == []
              assert proof["unhandled_commands"] == []
              assert isinstance(proof["messages"], list)
              typography = proof["typography"]
              assert typography["platform"] == "Gtk"
              assert typography["source"] == "fontconfig_pango_context"
              assert typography["ui_font_family"] == "Ubuntu Sans"
              assert typography["configured_ui_font"] == "Ubuntu Sans 11"
              assert typography["body_metrics"]["size"] > 0
              assert typography["body_metrics"]["ascent"] > 0
              assert typography == capture["typography"]
              memory = proof["process_memory"]
              assert memory["source"] == "linux_procfs_status_smaps_rollup"
              assert memory["sample_point"] == "native_window_before_teardown"
              assert memory["resident_bytes"] > 0
              assert memory["peak_resident_bytes"] >= memory["resident_bytes"]
              assert runtime["created_window_count"] == 1
              assert runtime["screenshot_captured"] is True
              assert not runtime["screenshot_error"]
              assert capture["backend"] == "winit_softbuffer_pango_cairo"
              assert capture["display_server"] == "x11"
              assert capture["pixel_width"] > 0
              assert capture["pixel_height"] > 0
              assert capture["scale_factor"] > 0.0
              assert 0.75 <= capture["typography_scale"] <= 3.0
              expected = (
                  {"width": 1180, "height": 780}
                  if stem.startswith("gallery-")
                  else {"width": 960, "height": 640}
              )
              assert proof["window"]["width"] == expected["width"]
              assert proof["window"]["height"] == expected["height"]
              assert proof["window"]["logical_width"] == expected["width"]
              assert proof["window"]["logical_height"] == expected["height"]
              assert proof["window"]["pixel_width"] == capture["pixel_width"]
              assert proof["window"]["pixel_height"] == capture["pixel_height"]
              assert proof["scale_factor"] == capture["scale_factor"]
              assert proof["typography_scale"] == capture["typography_scale"]
              assert capture["logical_width"] == expected["width"]
              assert capture["logical_height"] == expected["height"]
              assert abs(
                  capture["pixel_width"]
                  - capture["logical_width"] * capture["scale_factor"]
              ) <= 1.0
              if stem == "gallery-feedback-light":
                  assert proof["messages"] == ["MenuFlyoutCommand", "MenuFlyoutOpenChanged", "OpenMenuFlyout"]
                  assert runtime["native_view_message_count"] >= 3
                  assert runtime["native_view_event_count"] >= 2
                  assert runtime["native_view_menu_flyout_invoke_count"] == 1
                  assert runtime["native_view_menu_flyout_open_change_count"] == 1
                  assert runtime["native_view_menu_flyout_submenu_change_count"] == 4
                  assert runtime["native_view_key_down_count"] == 9
                  assert runtime["native_view_keyboard_activation_count"] == 1
                  assert runtime["native_view_focused_widget"] == 408
                  assert runtime["native_view_unhandled_click_count"] == 0
                  roles = {widget["role"] for widget in proof["widgets"]}
                  assert {"menu_flyout", "menu_flyout_scrim", "menu_flyout_item"} <= roles
              if stem == "gallery-catalog-light":
                  assert runtime["native_view_pointer_down_count"] == 2
                  assert runtime["native_view_pointer_move_count"] == 1
                  assert runtime["native_view_pointer_up_count"] == 2
                  assert runtime["native_view_canvas_pointer_event_count"] == 5
                  assert runtime["native_view_canvas_pointer_drag_count"] == 1
                  assert runtime["native_view_unhandled_click_count"] == 0

          lite_root = Path("target/native-proof/ubuntu-24.04-x86_64-lite")
          lite_png = lite_root / "notepad-interaction.png"
          lite_report = lite_root / "notepad-interaction.json"
          if lite_png.read_bytes()[:8] != b"\x89PNG\r\n\x1a\n":
              raise SystemExit(f"{lite_png} is not a PNG")
          proof = json.loads(lite_report.read_text(encoding="utf-8"))
          runtime = proof["runtime"]
          capture = runtime.get("native_view_capture") or {}
          assert proof["schema"] == "zsui.native-proof/v1"
          assert proof["platform"] == "linux"
          assert proof["backend"] == "linux-direct"
          assert proof["capture_backend"] == "winit_softbuffer_cosmic_text_tiny_skia"
          assert proof["errors"] == []
          assert proof["unhandled_commands"] == []
          assert proof["typography"]["source"] == "fontdb_cosmic_text"
          assert proof["typography"]["configured_ui_font"] == "Ubuntu Sans 11"
          assert proof["typography"]["body_metrics"]["ascent"] > 0
          assert proof["typography"] == capture["typography"]
          assert capture["backend"] == "winit_softbuffer_cosmic_text_tiny_skia"
          assert capture["display_server"] == "x11"
          assert runtime["created_window_count"] == 1
          assert runtime["screenshot_captured"] is True
          assert not runtime["screenshot_error"]
          assert proof["process_memory"]["resident_bytes"] > 0
          assert proof["window"]["width"] == 960
          assert proof["window"]["height"] == 640

      - name: Upload Linux proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zsui-linux-direct-native-proof
          path: target/native-proof/ubuntu-24.04-x86_64
          if-no-files-found: error
          retention-days: 30

      - name: Upload pure-Rust Linux proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zsui-linux-direct-lite-native-proof
          path: target/native-proof/ubuntu-24.04-x86_64-lite
          if-no-files-found: error
          retention-days: 30

  linux-wayland-atspi-proof:
    name: Wayland Runtime, AT-SPI and Menu Proof
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      TZ: UTC
      WINIT_UNIX_BACKEND: wayland
      ZSUI_LINUX_UI_FONT: Ubuntu Sans 11
      ZSUI_NATIVE_PROOF_OS_FAMILY: ubuntu-24.04
      ZSUI_NATIVE_PROOF_DURATION_MS: 12000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Wayland and AT-SPI proof runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            at-spi2-core \
            dbus-x11 \
            libcairo2-dev \
            libdbus-1-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libwayland-dev \
            libxkbcommon-dev \
            adwaita-icon-theme \
            librsvg2-common \
            fonts-ubuntu \
            fonts-noto-cjk \
            fonts-noto-color-emoji \
            python3-pyatspi \
            weston
          fc-cache --force

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Wayland proof applications with accessibility
        run: |
          cargo build \
            --release \
            --locked \
            --example component_gallery \
            --no-default-features \
            --features component-gallery-demo,accessibility
          cargo build \
            --release \
            --locked \
            --example zsui_notepad \
            --no-default-features \
            --features notepad-demo,accessibility

      - name: Run real Wayland, AT-SPI and menu scenes
        id: wayland-scenes
        run: |
          set -o pipefail
          root=target/native-proof/ubuntu-24.04-wayland-x86_64
          mkdir -p "$root"
          dbus-run-session -- bash -euxo pipefail <<'PROOF'
          root=target/native-proof/ubuntu-24.04-wayland-x86_64
          export XDG_RUNTIME_DIR="$RUNNER_TEMP/zsui-wayland-runtime"
          export WAYLAND_DISPLAY=wayland-zsui
          export WINIT_UNIX_BACKEND=wayland
          export NO_AT_BRIDGE=0
          export GTK_A11Y=always
          unset DISPLAY
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          weston_help="$(weston --help 2>&1 || true)"
          weston_args=(
            "--socket=$WAYLAND_DISPLAY"
            "--idle-time=0"
            "--width=1280"
            "--height=800"
            "--log=$PWD/$root/weston.log"
          )
          if grep -q -- '--renderer' <<<"$weston_help"; then
            weston_args+=("--renderer=pixman")
          else
            weston_args+=("--use-pixman")
          fi
          if grep -q -- '-B,' <<<"$weston_help" || grep -q -- '-B ' <<<"$weston_help"; then
            weston_args+=("-B" "headless")
          else
            weston_args+=("--backend=headless-backend.so")
          fi
          weston "${weston_args[@]}" &
          weston_pid=$!
          trap 'kill "$weston_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 100); do
            test -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" && break
            kill -0 "$weston_pid"
            sleep 0.1
          done
          test -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY"

          ./target/release/examples/component_gallery \
            --native-proof \
            --page inputs \
            --theme light \
            --width 1180 \
            --height 780 \
            --output "$root" \
            >"$root/gallery-inputs-light.log" 2>&1 &
          gallery_pid=$!

          # AccessKit intentionally activates its Unix adapter only after the
          # org.a11y.Status IsEnabled property changes. A headless Weston
          # session has no desktop settings daemon to perform that transition,
          # so drive the real AT-SPI status service after the app is listening.
          for attempt in $(seq 1 50); do
            if gdbus introspect \
              --session \
              --dest org.a11y.Bus \
              --object-path /org/a11y/bus \
              >"$root/atspi-status.log" 2>&1; then
              break
            fi
            sleep 0.1
          done
          sleep 0.5
          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Set \
            org.a11y.Status IsEnabled '<false>' \
            >>"$root/atspi-status.log"
          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Set \
            org.a11y.Status IsEnabled '<true>' \
            >>"$root/atspi-status.log"
          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Get \
            org.a11y.Status IsEnabled \
            >>"$root/atspi-status.log"

          /usr/bin/python3 - <<'PY'
          import json
          import time
          from pathlib import Path
          import pyatspi

          deadline = time.monotonic() + 10.0
          application = None
          snapshot = []

          def children(node):
              for index in range(node.childCount):
                  try:
                      yield node.getChildAtIndex(index)
                  except Exception:
                      pass

          def walk(root, limit=1500):
              queue = [root]
              seen = 0
              while queue and seen < limit:
                  node = queue.pop(0)
                  seen += 1
                  yield node
                  queue.extend(children(node))

          while time.monotonic() < deadline and application is None:
              desktop = pyatspi.Registry.getDesktop(0)
              for candidate in children(desktop):
                  try:
                      nodes = list(walk(candidate))
                      names = [node.name or "" for node in nodes]
                  except Exception:
                      continue
                  if any("Component Gallery" in name for name in names):
                      application = candidate
                      break
              if application is None:
                  time.sleep(0.1)

          if application is None:
              raise SystemExit("AT-SPI did not expose the ZSUI Component Gallery")

          action_invoked = False
          for node in walk(application):
              try:
                  role = node.getRoleName()
                  name = node.name or ""
              except Exception:
                  continue
              snapshot.append({"name": name, "role": role})
              if not action_invoked and role in {"push button", "button"}:
                  try:
                      actions = node.queryAction()
                      for index in range(actions.nActions):
                          if actions.getName(index) in {"click", "press", "activate"}:
                              action_invoked = bool(actions.doAction(index))
                              break
                  except Exception:
                      pass

          roles = {item["role"] for item in snapshot}
          if len(snapshot) < 5:
              raise SystemExit(f"AT-SPI tree is too small: {len(snapshot)} nodes")
          if not ({"push button", "button"} & roles):
              raise SystemExit(f"AT-SPI tree has no button role: {sorted(roles)}")
          if not action_invoked:
              raise SystemExit("AT-SPI did not invoke an exposed button action")

          Path(
              "target/native-proof/ubuntu-24.04-wayland-x86_64/atspi-proof.json"
          ).write_text(
              json.dumps(
                  {
                      "backend": "accesskit_atspi",
                      "application": application.name,
                      "node_count": len(snapshot),
                      "roles": sorted(roles),
                      "action_invoked": action_invoked,
                      "nodes": snapshot,
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )
          PY
          set -e
          wait "$gallery_pid"

          # Keep this application's adapter inactive while the scripted proof
          # interaction opens the nested MenuFlyout. Enabling AT-SPI afterwards
          # makes its initial tree reflect the final state instead of a cached
          # startup snapshot.
          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Set \
            org.a11y.Status IsEnabled '<false>' \
            >>"$root/atspi-status.log"

          ZSUI_NATIVE_PROOF_DURATION_MS=20000 \
            ./target/release/examples/component_gallery \
              --native-proof \
              --page feedback \
              --theme light \
              --width 1180 \
              --height 780 \
              --output "$root" \
              >"$root/gallery-feedback-light.log" 2>&1 &
          feedback_pid=$!

          # The Linux proof driver dispatches scripted inputs at half of the
          # requested duration. Activate this process's adapter afterwards.
          sleep 11.0
          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Set \
            org.a11y.Status IsEnabled '<true>' \
            >>"$root/atspi-status.log"

          /usr/bin/python3 - <<'PY'
          import json
          import time
          from pathlib import Path
          import pyatspi

          def children(node):
              for index in range(node.childCount):
                  try:
                      yield node.getChildAtIndex(index)
                  except Exception:
                      pass

          def walk(root, limit=1500):
              queue = [(root, "", 0)]
              seen = 0
              while queue and seen < limit:
                  node, parent_name, depth = queue.pop(0)
                  seen += 1
                  yield node, parent_name, depth
                  queue.extend(
                      (child, node.name or "", depth + 1)
                      for child in children(node)
                  )

          deadline = time.monotonic() + 6.0
          snapshot = []
          required = {
              "自动保存 / Auto save",
              "更多 / More",
              "导出 / Export",
              "PDF 文档 / PDF document",
          }
          while time.monotonic() < deadline:
              snapshot = []
              desktop = pyatspi.Registry.getDesktop(0)
              for application in children(desktop):
                  try:
                      nodes = list(walk(application))
                  except Exception:
                      continue
                  names = [node.name or "" for node, _, _ in nodes]
                  if not any("Component Gallery" in name for name in names):
                      continue
                  for node, parent_name, depth in nodes:
                      try:
                          state = node.getState()
                          snapshot.append(
                              {
                                  "name": node.name or "",
                                  "role": node.getRoleName(),
                                  "checked": state.contains(pyatspi.STATE_CHECKED),
                                  "atspi_expanded": state.contains(pyatspi.STATE_EXPANDED),
                                  "focused": state.contains(pyatspi.STATE_FOCUSED),
                                  "selected": state.contains(pyatspi.STATE_SELECTED),
                                  "parent": parent_name,
                                  "depth": depth,
                                  "child_count": node.childCount,
                              }
                          )
                      except Exception:
                          pass
              by_name = {item["name"]: item for item in snapshot}
              if (
                  required <= by_name.keys()
                  and by_name["自动保存 / Auto save"]["checked"]
                  and by_name["导出 / Export"]["parent"] == "更多 / More"
                  and by_name["PDF 文档 / PDF document"]["parent"] == "导出 / Export"
              ):
                  break
              time.sleep(0.1)

          by_name = {item["name"]: item for item in snapshot}
          if not required <= by_name.keys():
              raise SystemExit(
                  f"AT-SPI did not expose MenuFlyout rows: {sorted(by_name)}"
              )
          checked = by_name["自动保存 / Auto save"]
          submenu = by_name["更多 / More"]
          nested_submenu = by_name["导出 / Export"]
          nested_command = by_name["PDF 文档 / PDF document"]
          if not checked["checked"]:
              raise SystemExit(f"checked MenuFlyout state is missing: {checked}")
          if checked["role"] not in {"check menu item", "checkmenuitem"}:
              raise SystemExit(f"checked MenuFlyout role is missing: {checked}")
          if submenu["role"] != "menu":
              raise SystemExit(f"submenu MenuFlyout role is missing: {submenu}")
          if nested_submenu["role"] != "menu":
              raise SystemExit(
                  f"nested submenu MenuFlyout role is missing: {nested_submenu}"
              )
          if nested_submenu["parent"] != submenu["name"]:
              raise SystemExit(
                  f"nested submenu hierarchy is missing: {nested_submenu}"
              )
          if nested_command["parent"] != nested_submenu["name"]:
              raise SystemExit(
                  f"nested MenuFlyout command hierarchy is missing: {nested_command}"
              )

          Path(
              "target/native-proof/ubuntu-24.04-wayland-x86_64/menu-flyout-atspi-proof.json"
          ).write_text(
              json.dumps(
                  {
                      "backend": "accesskit_atspi",
                      "recursive_expansion": {
                          "source": "visible_atspi_parent_child_tree",
                          "submenu": submenu["name"],
                          "nested_submenu": nested_submenu["name"],
                          "nested_command": nested_command["name"],
                      },
                      "rows": [by_name[name] for name in sorted(required)],
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )
          PY
          wait "$feedback_pid"

          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Set \
            org.a11y.Status IsEnabled '<false>' \
            >>"$root/atspi-status.log" 2>&1

          ZSUI_NATIVE_PROOF_DURATION_MS=20000 \
          ZSUI_NATIVE_PROOF_OPEN_MENU=1 \
            ./target/release/examples/zsui_notepad \
              --native-proof \
              --menu-proof \
              --width 960 \
              --height 640 \
              --output "$root" \
              >"$root/notepad.log" 2>&1 &
          notepad_pid=$!

          # The proof driver opens the native desktop menu at half duration.
          # Activate this process's adapter afterwards so its initial tree
          # contains the real menu-item rows rather than only the menu bar.
          sleep 11.0
          set +e
          python3 comparisons/scripts/capture_linux_smaps.py \
            --pid "$notepad_pid" \
            --output "$root/notepad-smaps.json" \
            >"$root/notepad-smaps.log" 2>&1
          notepad_smaps_status=$?
          set -e
          echo "notepad_smaps_status=$notepad_smaps_status" >>"$root/notepad-smaps.log"
          gdbus call \
            --session \
            --dest org.a11y.Bus \
            --object-path /org/a11y/bus \
            --method org.freedesktop.DBus.Properties.Set \
            org.a11y.Status IsEnabled '<true>' \
            >>"$root/atspi-status.log" 2>&1

          set +e
          /usr/bin/python3 - <<'PY'
          import json
          import time
          from pathlib import Path
          import pyatspi

          deadline = time.monotonic() + 6.0
          application = None

          def children(node):
              for index in range(node.childCount):
                  try:
                      yield node.getChildAtIndex(index)
                  except Exception:
                      pass

          def walk(root, limit=600):
              queue = [root]
              seen = 0
              while queue and seen < limit:
                  node = queue.pop(0)
                  seen += 1
                  yield node
                  queue.extend(children(node))

          while time.monotonic() < deadline and application is None:
              desktop = pyatspi.Registry.getDesktop(0)
              for candidate in children(desktop):
                  try:
                      nodes = list(walk(candidate))
                      names = [node.name or "" for node in nodes]
                  except Exception:
                      continue
                  roles = []
                  for node in nodes:
                      try:
                          roles.append(node.getRoleName())
                      except Exception:
                          pass
                  if any("notepad" in name.lower() for name in names) or (
                      any(role in {"menu bar", "menubar"} for role in roles)
                      and any("file" in name.lower() for name in names)
                  ):
                      application = candidate
                      break
              if application is None:
                  time.sleep(0.1)

          if application is None:
              raise SystemExit("AT-SPI did not expose ZSUI Notepad")
          snapshot = []
          for node in walk(application):
              try:
                  snapshot.append({"name": node.name or "", "role": node.getRoleName()})
              except Exception:
                  pass
          roles = {item["role"] for item in snapshot}
          if not ({"menu bar", "menubar"} & roles):
              raise SystemExit(f"AT-SPI menu bar role missing: {sorted(roles)}")
          if not ({"menu item", "menuitem"} & roles):
              raise SystemExit(f"AT-SPI menu item role missing: {sorted(roles)}")
          Path(
              "target/native-proof/ubuntu-24.04-wayland-x86_64/notepad-atspi-proof.json"
          ).write_text(
              json.dumps(
                  {
                      "backend": "accesskit_atspi",
                      "application": application.name,
                      "node_count": len(snapshot),
                      "roles": sorted(roles),
                      "nodes": snapshot,
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )
          PY
          notepad_atspi_status=$?
          set -e
          echo "notepad_atspi_status=$notepad_atspi_status" >>"$root/notepad-atspi.log"
          wait "$notepad_pid"
          if [ "$notepad_atspi_status" -ne 0 ]; then
            exit "$notepad_atspi_status"
          fi
          PROOF

      - name: Summarize Wayland proof failure
        if: failure() && steps.wayland-scenes.outcome == 'failure'
        run: |
          root=target/native-proof/ubuntu-24.04-wayland-x86_64
          tail -80 "$root"/*.log 2>/dev/null || true
          summary="$(tail -80 "$root"/*.log 2>/dev/null | tr '\n' ' ' | cut -c 1-1200 || true)"
          echo "::error title=Wayland proof scene failure::$summary"

      - name: Validate Wayland, AT-SPI and menu artifacts
        shell: python
        run: |
          import json
          from pathlib import Path

          root = Path("target/native-proof/ubuntu-24.04-wayland-x86_64")
          gallery = json.loads((root / "gallery-inputs-light.json").read_text("utf-8"))
          feedback = json.loads((root / "gallery-feedback-light.json").read_text("utf-8"))
          notepad = json.loads((root / "notepad-interaction.json").read_text("utf-8"))
          atspi = json.loads((root / "atspi-proof.json").read_text("utf-8"))
          menu_atspi = json.loads(
              (root / "menu-flyout-atspi-proof.json").read_text("utf-8")
          )
          notepad_atspi = json.loads(
              (root / "notepad-atspi-proof.json").read_text("utf-8")
          )

          for proof in (gallery, feedback, notepad):
              capture = proof["runtime"]["native_view_capture"]
              assert proof["schema"] == "zsui.native-proof/v1"
              assert proof["platform"] == "linux"
              assert proof["backend"] == "linux-direct"
              assert proof["display_server"] == "wayland"
              assert capture["display_server"] == "wayland"
              assert proof["errors"] == []
              assert proof["unhandled_commands"] == []

          for proof in (gallery, feedback, notepad):
              assert proof["runtime"]["native_accessibility_backend"] == "accesskit_atspi"
              assert proof["runtime"]["native_accessibility_node_count"] >= 5

          assert gallery["runtime"]["native_accessibility_action_count"] >= 1
          feedback_runtime = feedback["runtime"]
          assert feedback["messages"] == ["MenuFlyoutCommand", "MenuFlyoutOpenChanged", "OpenMenuFlyout"]
          assert feedback_runtime["native_view_message_count"] >= 3
          assert feedback_runtime["native_view_event_count"] >= 2
          assert feedback_runtime["native_view_menu_flyout_invoke_count"] == 1
          assert feedback_runtime["native_view_menu_flyout_open_change_count"] == 1
          assert feedback_runtime["native_view_menu_flyout_submenu_change_count"] == 4
          assert feedback_runtime["native_view_key_down_count"] == 9
          assert feedback_runtime["native_view_keyboard_activation_count"] == 1
          assert feedback_runtime["native_view_focused_widget"] == 408
          assert feedback_runtime["native_view_unhandled_click_count"] == 0
          feedback_roles = {widget["role"] for widget in feedback["widgets"]}
          assert {"menu_flyout", "menu_flyout_scrim", "menu_flyout_item"} <= feedback_roles
          assert atspi["backend"] == "accesskit_atspi"
          assert atspi["node_count"] >= 5
          assert atspi["action_invoked"] is True
          assert menu_atspi["backend"] == "accesskit_atspi"
          menu_rows = {row["name"]: row for row in menu_atspi["rows"]}
          assert menu_rows["自动保存 / Auto save"]["checked"] is True
          assert menu_rows["自动保存 / Auto save"]["role"] in {
              "check menu item",
              "checkmenuitem",
          }
          assert menu_rows["更多 / More"]["role"] == "menu"
          assert menu_rows["导出 / Export"]["role"] == "menu"
          assert menu_rows["导出 / Export"]["parent"] == "更多 / More"
          assert (
              menu_rows["PDF 文档 / PDF document"]["parent"]
              == "导出 / Export"
          )
          assert menu_atspi["recursive_expansion"] == {
              "source": "visible_atspi_parent_child_tree",
              "submenu": "更多 / More",
              "nested_submenu": "导出 / Export",
              "nested_command": "PDF 文档 / PDF document",
          }
          assert notepad_atspi["backend"] == "accesskit_atspi"
          assert notepad_atspi["node_count"] >= 5
          assert {"menu bar", "menu item"} <= set(notepad_atspi["roles"])

          runtime = notepad["runtime"]
          assert runtime["window_menu_surface_created"] is True
          assert runtime["window_menu_surface_height"] == 36
          assert runtime["window_menu_surface_open_at_capture"] is True
          assert runtime["window_menu_command_routed"] is True
          assert (
              root / "gallery-inputs-light.png"
          ).read_bytes()[:8] == b"\x89PNG\r\n\x1a\n"
          assert (
              root / "gallery-feedback-light.png"
          ).read_bytes()[:8] == b"\x89PNG\r\n\x1a\n"
          assert (
              root / "notepad-interaction.png"
          ).read_bytes()[:8] == b"\x89PNG\r\n\x1a\n"

