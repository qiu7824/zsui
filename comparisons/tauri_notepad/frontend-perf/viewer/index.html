<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Viewer</title>
  <style>*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","Microsoft YaHei UI",sans-serif;background:#f5f6f8;color:#20242b}.empty *{display:none}.page{height:100vh;overflow:auto;padding:20px}.meta{color:#5f6670}.panel{padding:14px;background:#fff;border:1px solid #dce1e8;border-radius:9px}.panel>*{margin:7px 0}.panel input,.panel select,.panel progress{width:100%}.actions{display:flex;gap:8px}.components{display:grid;grid-template-columns:1fr 1fr;gap:4px 32px}.components span{display:block}button,input,select{font:inherit;padding:7px 10px}</style>
</head>
<body><main class="page"><h1>UiDocument 全组件性能页 / All-component performance page</h1><p class="meta">26 种文档组件 · 250 ms 热重载 · 修订 <span id="revision">1</span></p><section class="panel"><p>固定加载当前 schema 的全部文档组件；Viewer 额外保留文件轮询、解析、验证与状态映射。</p><button>选择发票 / Choose invoice</button><input value="示例销售方_28.30.pdf"><label><input type="checkbox" checked> 自动识别 / Auto detect</label><label><input type="checkbox" checked> 固定规则 / Pin rule</label><input type="range" value="68"><progress value="68" max="100"></progress><select><option>销售方_税额</option><option>日期_号码</option></select><div class="actions"><button>重新加载 / Reload</button><button>验证文档 / Validate</button></div></section><h3>文档组件 / Document components</h3><section class="components" id="components"></section></main><script>const names=['Stack','Border','Scroll','Tabs','List','Grid','Text','Button','ToggleButton','CheckBox','Toggle','TextBox','PasswordBox','RadioButton','Slider','NumberBox','ComboBox','AutoSuggestBox','CommandPalette','TreeView','GridView','DatePicker','TimePicker','ColorPicker','ProgressBar','ProgressRing'];document.querySelector('#components').innerHTML=names.map(x=>`<span>${x}</span>`).join('');window.setViewerRevision=n=>document.querySelector('#revision').textContent=n;if(location.search.includes('empty=1'))document.body.className='empty'</script></body>
</html>
